name: Deploy to AWS EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # This line fixes the warning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Go into the actual repository folder
             cd /var/www/html/CI-CD
            
            # 2. Pull the changes directly into this folder
            git pull origin main
            
            # 3. Restart Nginx
            sudo systemctl restart nginx
