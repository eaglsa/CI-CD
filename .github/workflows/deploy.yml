name: Deploy to AWS EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the web root
            cd /var/www/html
            
            # Pull the latest changes
            git pull origin main
            
            # Option A: If you want the site to load directly from the IP,
            # we copy the contents of ci-cd to the root.
            sudo cp -r ci-cd/* .
            
            # Restart Nginx
            sudo systemctl restart nginx
