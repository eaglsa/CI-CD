<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Modern Landing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-bold tracking-tighter text-indigo-600">
            STRATOS<span class="text-slate-400">.</span>
        </div>
        <div class="hidden md:flex space-x-8 font-medium text-slate-600">
            <a href="#" class="hover:text-indigo-600 transition">Features</a>
            <a href="#" class="hover:text-indigo-600 transition">Solutions</a>
            <a href="#" class="hover:text-indigo-600 transition">Pricing</a>
        </div>
        <a href="#" class="bg-indigo-600 text-white px-5 py-2.5 rounded-full font-semibold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
            Sign Up
        </a>
    </nav>

    <main class="relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 blur-3xl opacity-20 pointer-events-none">
            <div class="h-[400px] w-[600px] bg-indigo-500 rounded-full"></div>
        </div>

        <section class="max-w-7xl mx-auto px-8 py-20 md:py-32 flex flex-col items-center text-center relative z-10">
            <span class="inline-block px-4 py-1.5 mb-6 text-sm font-semibold tracking-wide text-indigo-700 uppercase bg-indigo-100 rounded-full">
                New: Version 3.0 is live
            </span>

            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-slate-900 mb-6">
                Design your workflow <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-600">
                    without any friction.
                </span>
            </h1>

            <p class="max-w-2xl text-lg md:text-xl text-slate-600 mb-10 leading-relaxed">
                The All-In-One workspace to write, plan, and get organized. 
                Trusted by over 10,000 teams to launch products that matter.
            </p>

            <div class="flex flex-col sm:flex-row gap-4">
                <button class="px-8 py-4 bg-slate-900 text-white rounded-xl font-bold text-lg hover:bg-slate-800 transition-all transform hover:-translate-y-1">
                    Start Free
                </button>
                <button class="px-8 py-4 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold text-lg hover:bg-slate-50 transition-all">
                    Book a demo
                </button>
            </div>

            <div class="mt-16 pt-8 border-t border-slate-200 w-full">
                <p class="text-sm font-medium text-slate-400 uppercase tracking-widest mb-6">Powering the world's best teams !!</p>
                <div class="flex flex-wrap justify-center gap-8 opacity-50 grayscale">
                    <span class="text-xl font-bold">GITHUB</span>
                    <span class="text-xl font-bold">SLACK</span>
                    <span class="text-xl font-bold">ADOBE</span>
                    <span class="text-xl font-bold">SPOTIFY</span>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
